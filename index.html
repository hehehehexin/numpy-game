<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NumPy 三关挑战 | 台账危机 + 代码创世纪 + 分组擂台赛(可自定义队伍+加赛)</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9eec1 0%, #f7e0ac 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Fredoka One', 'Comic Neue', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }

        /* 关卡导航 */
        .level-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .level-btn {
            background: #ffdb8e;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 25px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b87e3a;
            transition: 0.1s;
            color: #4a2e12;
        }
        .level-btn.active {
            background: #3ba87a;
            color: white;
            box-shadow: 0 5px 0 #1f7848;
            transform: scale(1.02);
        }
        .level-btn:active {
            transform: translateY(2px);
        }

        .level-container {
            display: none;
        }
        .level-container.active {
            display: block;
        }

        /* 第一关样式 (台账危机) 沿用之前紧凑设计 */
        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 60px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            padding: 18px 24px 28px;
            border: 3px solid #ffae5a;
        }
        .game-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            background: #ffefcf;
            padding: 10px 24px;
            border-radius: 80px;
            margin-bottom: 20px;
        }
        .target-card {
            background: #ffdb8e;
            padding: 6px 20px;
            border-radius: 56px;
            font-weight: bold;
            display: flex;
            align-items: baseline;
            gap: 18px;
            flex-wrap: wrap;
        }
        .coordinate-query {
            background: #2e4057;
            padding: 4px 18px;
            border-radius: 56px;
            color: #ffeaac;
        }
        .coordinate-query span {
            color: #ffbc6e;
            font-size: 1.9rem;
            font-weight: 800;
        }
        .timer-area {
            background: #1f2c3c;
            padding: 6px 24px;
            border-radius: 50px;
            color: #5effbc;
            font-family: monospace;
            font-size: 2rem;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .size-selector {
            background: #ffefcf;
            padding: 6px 20px;
            border-radius: 60px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .size-control input {
            width: 60px;
            padding: 5px;
            border-radius: 30px;
            border: none;
            text-align: center;
        }
        button {
            background: #ff914d;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 28px;
            border-radius: 56px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b4622a;
            transition: 0.05s linear;
        }
        .start-game-btn { background: #3ba87a; color: white; box-shadow: 0 4px 0 #1f7848; }
        .rank-btn { background: #4a86e8; color: white; }
        .grid-wrapper {
            background: #fef0db;
            border-radius: 48px;
            padding: 12px;
            margin: 12px 0 20px;
        }
        .number-grid {
            display: grid;
            gap: 4px;
            background: #fff3e2;
            padding: 6px;
            border-radius: 32px;
            justify-content: center;
        }
        .grid-cell {
            background: #fff7eb;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            padding: 6px 2px;
            cursor: pointer;
            box-shadow: 0 2px 0 #ddbc88;
            border: 1px solid #ffe1b5;
        }
        .grid-cell.correct-highlight { background: #f7bc45; box-shadow: 0 0 0 2px #ffd966; transform: scale(0.98); }
        .grid-cell.disabled-cell { opacity: 0.6; pointer-events: none; }
        .message-area {
            text-align: center;
            background: #fff3df;
            border-radius: 48px;
            padding: 12px;
            font-weight: bold;
            color: #c76300;
        }
        .next-level-btn { background: #ff914d; margin-top: 20px; width: 100%; font-size: 1.2rem; }

        /* 第二关样式 (纯前端模拟批改) */
        .code-challenge {
            max-width: 1200px;
            margin: 0 auto;
            background: #1e2a2a;
            border-radius: 48px;
            padding: 24px;
            color: #e6f7f0;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .question-box {
            background: #2d3e3e;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .question-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 10px; color: #ffbc6e; }
        .random-params {
            background: #00000055;
            padding: 12px;
            border-radius: 28px;
            font-family: monospace;
        }
        .code-area {
            background: #0f1a1a;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            background: #1e2f2f;
            border: 2px solid #ffae5a;
            border-radius: 24px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            color: #f0f0e0;
            resize: vertical;
        }
        .action-buttons { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .run-btn { background: #3ba87a; color: white; }
        .submit-btn { background: #e68a2e; color: white; }
        .output-area, .feedback {
            background: #0a1212;
            border-radius: 28px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
        }
        .feedback.correct { border-left: 8px solid #3ba87a; background: #1e3a2e; }
        .feedback.wrong { border-left: 8px solid #e07c3c; background: #3a2a1e; }

        /* 第三关 分组擂台赛 增强自定义队伍 */
        .quiz-arena {
            max-width: 1300px;
            margin: 0 auto;
            background: #2d2b1f;
            border-radius: 64px;
            padding: 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 3px solid #ffbc6e;
        }
        .team-panel {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .team-card {
            flex: 1;
            background: #fdf8ed;
            border-radius: 48px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 8px 0 #b97f3a;
            border: 2px solid #ffbc6e;
            min-width: 180px;
        }
        .team-card.active-turn {
            transform: scale(1.02);
            background: #ffe3aa;
            box-shadow: 0 0 0 3px #ffb347;
        }
        .team-name-input {
            background: transparent;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            color: #4a2e12;
            font-family: inherit;
        }
        .team-score {
            font-size: 2rem;
            font-weight: bold;
            color: #d45a1a;
        }
        .question-card {
            background: #1e2a2a;
            border-radius: 48px;
            padding: 25px;
            margin: 20px 0;
            color: white;
        }
        .quiz-question {
            font-size: 1.4rem;
            background: #0f1a1a;
            padding: 20px;
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .option-btn {
            background: #2d3e3e;
            border: 2px solid #ffae5a;
            border-radius: 60px;
            padding: 12px;
            font-size: 1rem;
            text-align: left;
            color: white;
            cursor: pointer;
            transition: 0.05s;
        }
        .option-btn:hover { background: #3a5a5a; }
        .quiz-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .nextq-btn { background: #ff914d; color: #2c1c0c; }
        .reset-quiz-btn { background: #4a86e8; color: white; }
        .overtime-btn { background: #e68a2e; color: white; }
        .winner-banner {
            text-align: center;
            background: gold;
            border-radius: 60px;
            padding: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 20px;
        }
        .badge {
            background: #3ba87a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 5px;
        }
        footer { text-align: center; font-size: 0.7rem; margin-top: 20px; color: #bb793b; }
        .edit-tip { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; }
    </style>
</head>
<body>
<div class="level-tabs">
    <button class="level-btn active" data-level="1">📊 第一关 · 台账危机</button>
    <button class="level-btn" data-level="2">🐍 第二关 · NumPy 创世纪</button>
    <button class="level-btn" data-level="3">⚡ 第三关 · 切片/布尔索引擂台赛</button>
</div>

<!-- 第一关内容 (精简保留核心功能) -->
<div id="level1" class="level-container active">
    <div class="game-container">
        <div class="game-header">
            <div class="target-card"><span>📊 台账危机</span><div class="coordinate-query">🎯 第 <span id="targetRowIdx">??</span> 行 第 <span id="targetColIdx">??</span> 列</div><span>💰 收盘价 = ?</span></div>
            <div class="timer-area">⏱️ <span id="timerDisplay">0.00</span> s</div>
        </div>
        <div class="control-panel">
            <div class="size-selector"><div class="size-control"><label>行数</label><input type="number" id="rowsInput" value="16"></div><div class="size-control"><label>列数</label><input type="number" id="colsInput" value="18"></div><button id="applySizeBtn">设定</button></div>
            <button class="start-game-btn" id="startGameBtn">🚀 开始挑战</button><button class="rank-btn" id="rankBtn">🏆 英雄榜</button>
        </div>
        <div class="grid-wrapper"><div id="numberGrid" class="number-grid"></div></div>
        <div class="message-area" id="messageArea">点击开始挑战，定位目标价格</div>
        <button id="nextLevelBtn" class="next-level-btn">✨ 进入下一关 ✨</button>
    </div>
</div>

<!-- 第二关：数组创建 (模拟批改) -->
<div id="level2" class="level-container">
    <div class="code-challenge">
        <div class="question-box"><div class="question-title">🧠 NumPy 数组创建挑战</div><div class="random-params" id="randomQuestionArea"></div></div>
        <div class="code-area"><textarea id="codeInput" rows="6" placeholder="import numpy as np&#10;arr = "></textarea><div class="action-buttons"><button id="runCodeBtn" class="run-btn">▶ 模拟运行</button><button id="submitCodeBtn" class="submit-btn">🤖 AI批改</button></div></div>
        <div class="output-area"><strong>解析结果:</strong><br><span id="runOutput">等待运行</span></div>
        <div class="feedback" id="feedbackArea"><strong>💡 批改结果</strong><br><span id="aiFeedback">等待批改</span></div>
    </div>
</div>

<!-- 第三关：切片 + 布尔索引 分组挑战 (自定义队名+加赛) -->
<div id="level3" class="level-container">
    <div class="quiz-arena">
        <div class="team-panel" id="teamPanel"></div>  <!-- 动态生成队伍 -->
        <div class="question-card">
            <div style="display: flex; justify-content: space-between; flex-wrap:wrap;"><span>🏆 第 <span id="currentQIdx">1</span> / <span id="totalQ">5</span> 题</span><span id="statusMsg">⚡ 点击队伍卡片抢答！</span></div>
            <div class="quiz-question" id="quizQuestion">加载题目中...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="quiz-controls">
                <button id="nextQuestionBtn" class="nextq-btn" disabled>下一题 (需先作答)</button>
                <button id="resetQuizBtn" class="reset-quiz-btn">🔄 重置擂台</button>
                <button id="overtimeBtn" class="overtime-btn" style="display:none;">⚡ 加赛一题</button>
            </div>
            <div id="winnerMessage" class="winner-banner" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    // ----------------------------------- 第一关逻辑 (台账危机) ----------------------------------
    let currentRows = 16, currentCols = 18, priceMatrix = [], targetRow = 0, targetCol = 0;
    let gameActive = false, gameWin = false, timerInterval = null, startTime = null, elapsed = 0, rankings = [];
    const gridContainer = document.getElementById('numberGrid'), targetRowSpan = document.getElementById('targetRowIdx'), targetColSpan = document.getElementById('targetColIdx');
    const timerDisplaySpan = document.getElementById('timerDisplay'), messageDiv = document.getElementById('messageArea');
    const startGameBtn = document.getElementById('startGameBtn'), rankBtn = document.getElementById('rankBtn'), applySizeBtn = document.getElementById('applySizeBtn');
    const rowsInput = document.getElementById('rowsInput'), colsInput = document.getElementById('colsInput'), nextLevelBtn = document.getElementById('nextLevelBtn');

    function getPrice(){ let p = 47.6+Math.random()*6.2+(Math.random()-0.5)*0.95; return Math.min(54.9,Math.max(46.5,p)).toFixed(2); }
    function generateMatrix(r,c){ let m=[]; for(let i=0;i<r;i++){ let row=[]; for(let j=0;j<c;j++) row.push(getPrice()); m.push(row); } return m; }
    function randomTarget(r,c){ return { rowIdx: Math.floor(Math.random()*(r-Math.floor(r*0.7)))+Math.floor(r*0.7), colIdx: Math.floor(Math.random()*(c-Math.floor(c*0.6)))+Math.floor(c*0.6) }; }
    function stopTimer(){ if(timerInterval) clearInterval(timerInterval); }
    function startTimer(){ stopTimer(); startTime=performance.now(); timerInterval=setInterval(()=>{ if(gameActive && !gameWin){ let sec=(performance.now()-startTime)/1000; elapsed=sec; timerDisplaySpan.innerText=sec.toFixed(2); } },35); }
    function finishGame(){ if(!gameActive||gameWin) return; gameActive=false; gameWin=true; stopTimer(); let final=Math.max(0.08,elapsed); timerDisplaySpan.innerText=final.toFixed(2); alert(`🎉 通关！ 用时 ${final.toFixed(2)}秒`); }
    function onCellClick(r,c){ if(!gameActive||gameWin) return; if(r===targetRow && c===targetCol){ finishGame(); document.querySelector(`.grid-cell[data-row='${r}'][data-col='${c}']`)?.classList.add('correct-highlight'); }else{ messageDiv.innerText=`❌错误 (${r+1},${c+1})`; setTimeout(()=>{if(gameActive) messageDiv.innerText="点击目标价格";},800); } }
    function renderGrid(){ let rows=priceMatrix.length, cols=priceMatrix[0].length; let minW=cols<=15?62:(cols<=20?54:48); gridContainer.style.display='grid'; gridContainer.style.gridTemplateColumns=`repeat(${cols}, minmax(${minW}px,70px))`; gridContainer.innerHTML=''; for(let i=0;i<rows;i++) for(let j=0;j<cols;j++){ let cell=document.createElement('div'); cell.className='grid-cell'; cell.innerText=priceMatrix[i][j]; cell.addEventListener('click',(function(r,c){return function(){onCellClick(r,c);}})(i,j)); gridContainer.appendChild(cell); } }
    function startNewGame(){ stopTimer(); gameActive=false; gameWin=false; priceMatrix=generateMatrix(currentRows,currentCols); let t=randomTarget(currentRows,currentCols); targetRow=t.rowIdx; targetCol=t.colIdx; targetRowSpan.innerText=targetRow+1; targetColSpan.innerText=targetCol+1; renderGrid(); gameActive=true; gameWin=false; startTimer(); messageDiv.innerText="找到目标价格！"; }
    function resizeMatrix(){ let nr=Math.min(35,Math.max(4,parseInt(rowsInput.value)||16)), nc=Math.min(30,Math.max(4,parseInt(colsInput.value)||18)); currentRows=nr; currentCols=nc; startNewGame(); }
    function loadRankings(){ let s=localStorage.getItem('rank'); if(s) rankings=JSON.parse(s); else rankings=[{name:"闪电侠",time:8.2}]; }
    function openRank(){ alert("🏆 英雄榜\n"+rankings.map((r,i)=>`${i+1}. ${r.name} ${r.time}s`).join("\n")); }
    startGameBtn.onclick=startNewGame; rankBtn.onclick=openRank; applySizeBtn.onclick=resizeMatrix; nextLevelBtn.onclick=()=>document.querySelector('.level-btn[data-level="2"]').click();
    window.addEventListener('load',()=>{ resizeMatrix(); loadRankings(); });
    
    // ----------------------------------- 第二关 (纯前端批改) ----------------------------------
    let currentQuestion = null;
    function generateQuestion(){
        let type=Math.random()<0.5?'arange':'array';
        if(type==='arange'){
            let start=Math.floor(Math.random()*20)-5, stop=start+Math.floor(Math.random()*25)+5, step=[1,2,3,5][Math.floor(Math.random()*4)]||1;
            let expected=[]; for(let i=start;i<stop;i+=step) expected.push(i);
            return { desc:`使用 np.arange 创建从 ${start} 到 ${stop} (不含) 步长 ${step} 的一维数组`, expected, check:(arr)=>Array.isArray(arr)&&arr.length===expected.length&&arr.every((v,i)=>v===expected[i]) };
        }else{
            let len=Math.floor(Math.random()*5)+3, els=[]; for(let i=0;i<len;i++) els.push(Math.floor(Math.random()*50)-10);
            return { desc:`使用 np.array 创建数组: [${els.join(', ')}]`, expected:els, check:(arr)=>Array.isArray(arr)&&arr.length===els.length&&arr.every((v,i)=>v===els[i]) };
        }
    }
    function updateSecondUI(){ currentQuestion=generateQuestion(); document.getElementById('randomQuestionArea').innerHTML=`<div>📌 ${currentQuestion.desc}</div><div style="margin-top:8px">要求: 赋值给 arr</div>`; document.getElementById('codeInput').value='import numpy as np\n\narr = '; document.getElementById('runOutput').innerText='等待运行'; document.getElementById('aiFeedback').innerHTML='等待批改'; document.getElementById('feedbackArea').className='feedback'; }
    function parseCodeToArray(code){ try{ let match=code.match(/arr\s*=\s*(.+?)(;|$)/s); if(!match) return {ok:false,err:"未找到 arr ="}; let expr=match[1].trim(); let arange=expr.match(/np\.arange\(([^)]+)\)/); if(arange){ let args=arange[1].split(',').map(Number); if(args.length===1){ let a=[]; for(let i=0;i<args[0];i++) a.push(i); return {ok:true,data:a}; }else if(args.length===2){ let a=[]; for(let i=args[0];i<args[1];i++) a.push(i); return {ok:true,data:a}; }else if(args.length===3){ let a=[]; for(let i=args[0];i<args[1];i+=args[2]) a.push(i); return {ok:true,data:a}; } } let arrMatch=expr.match(/np\.array\(\[\s*([\d,\-\s]+)\s*\]\)/); if(arrMatch){ let items=arrMatch[1].split(',').map(v=>Number(v.trim())); if(items.some(isNaN)) throw new Error(); return {ok:true,data:items}; } return {ok:false,err:"仅支持 np.arange 或 np.array([...])"}; }catch(e){ return {ok:false,err:"解析失败"}; } }
    function runCode(){ let code=document.getElementById('codeInput').value; if(!code.includes('import numpy')){ document.getElementById('runOutput').innerText='⚠️ 请导入 numpy'; return; } let res=parseCodeToArray(code); if(res.ok) document.getElementById('runOutput').innerText=`✅ 数组: [${res.data.join(', ')}]`; else document.getElementById('runOutput').innerText=`❌ ${res.err}`; }
    function aiSubmit(){ let code=document.getElementById('codeInput').value, outSpan=document.getElementById('aiFeedback'), fbDiv=document.getElementById('feedbackArea'); if(!code.includes('import numpy')){ outSpan.innerHTML='⚠️ 缺少 import numpy'; fbDiv.className='feedback wrong'; return; } if(!code.includes('arr =')){ outSpan.innerHTML='⚠️ 未定义 arr'; fbDiv.className='feedback wrong'; return; } let res=parseCodeToArray(code); if(!res.ok){ outSpan.innerHTML=`❌ ${res.err}`; fbDiv.className='feedback wrong'; return; } let valid=currentQuestion.check(res.data); if(valid){ outSpan.innerHTML='✅ 完全正确！数组创建成功！'; fbDiv.className='feedback correct'; setTimeout(()=>{ if(confirm('🎉 正确！生成下一题？')) updateSecondUI(); },200); }else{ outSpan.innerHTML=`❌ 期望: [${currentQuestion.expected.join(', ')}] 得到: [${res.data.join(', ')}]`; fbDiv.className='feedback wrong'; } }
    document.getElementById('runCodeBtn').onclick=runCode; document.getElementById('submitCodeBtn').onclick=aiSubmit;
    
    // ----------------------------------- 第三关: 切片/布尔索引 分组擂台 (自定义队名+加赛) ----------------------------------
    // 题库
    const questionBank = [
        { text: "已知数组 arr = np.array([10, 20, 30, 40, 50])，请问 arr[1:4] 的结果是？", options: ["[20, 30, 40]", "[10, 20, 30]", "[30, 40, 50]", "[20, 30]"], correct: 0 },
        { text: "对于 arr = np.arange(12).reshape(3,4)，使用 arr[:, 2] 会得到什么形状？", options: ["(3,)", "(4,)", "(3,4)", "报错"], correct: 0 },
        { text: "布尔索引: arr = np.array([5, 10, 15, 20])，arr[arr > 12] 的结果是？", options: ["[15, 20]", "[10, 15, 20]", "[5, 10]", "[15]"], correct: 0 },
        { text: "arr = np.array([[1,2],[3,4],[5,6]])，arr[::2, 1] 的结果？", options: ["[2, 6]", "[2,4,6]", "[1,3,5]", "[4]"], correct: 0 },
        { text: "关于布尔索引，以下哪个说法正确？", options: ["布尔索引必须和原数组形状相同", "布尔索引长度可以不同", "布尔索引只能用于一维", "布尔索引返回视图"], correct: 0 },
        { text: "arr = np.array([1,2,3,4,5])，执行 arr[arr % 2 == 0] 得到？", options: ["[2,4]", "[1,3,5]", "[2,4,6]", "[2]"], correct: 0 },
        { text: "切片 arr[:, 0:2] 对于二维数组的含义？", options: ["所有行，前两列", "前两行所有列", "所有行后两列", "第二列"], correct: 0 },
        { text: "arr = np.array([10,20,30])，arr[-2:] 输出？", options: ["[20,30]", "[10,20]", "[30]", "[10]"], correct: 0 }
    ];
    let quizQuestions = []; let currentQIndex = 0; let teamScores = [0,0,0]; let canAnswer = true; let answered = false; let winnerDeclared = false; let overtimeMode = false; // 加赛标记
    let teamNames = ["烈焰队", "碧波队", "磐石队"];
    
    function shuffleAndPick5(baseCount=5){ 
        let shuffled=[...questionBank]; 
        for(let i=shuffled.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; } 
        quizQuestions = shuffled.slice(0, baseCount); 
    }
    
    // 动态生成队伍UI
    function renderTeamPanel(){
        const panel = document.getElementById('teamPanel');
        panel.innerHTML = '';
        for(let i=0;i<3;i++){
            const card = document.createElement('div');
            card.className = 'team-card';
            card.dataset.team = i;
            card.innerHTML = `
                <input type="text" class="team-name-input" value="${teamNames[i]}" maxlength="12" data-teamidx="${i}">
                <div class="team-score" id="score${i}">${teamScores[i]}</div>
                <div class="badge">点击抢答</div>
                <div class="edit-tip">✏️ 点击名称可修改</div>
            `;
            card.addEventListener('click', (e) => { if(e.target.classList?.contains('team-name-input')) return; onTeamClick(i); });
            panel.appendChild(card);
            const nameInput = card.querySelector('.team-name-input');
            nameInput.addEventListener('change', (e) => { teamNames[i] = e.target.value.trim() || teamNames[i]; updateTeamNameDisplays(); });
        }
    }
    function updateTeamNameDisplays(){ for(let i=0;i<3;i++){ let input = document.querySelector(`.team-name-input[data-teamidx="${i}"]`); if(input) input.value = teamNames[i]; } }
    function updateScoresUI(){ for(let i=0;i<3;i++){ let scoreSpan = document.getElementById(`score${i}`); if(scoreSpan) scoreSpan.innerText = teamScores[i]; } }
    
    function onTeamClick(teamId){
        if(winnerDeclared){ document.getElementById('statusMsg').innerHTML='比赛已结束，请重置或加赛'; return; }
        if(!canAnswer || answered){ document.getElementById('statusMsg').innerHTML='⏰ 已经作答过，请等待下一题'; return; }
        document.querySelectorAll('.team-card').forEach(card=>card.classList.remove('active-turn'));
        document.querySelector(`.team-card[data-team="${teamId}"]`).classList.add('active-turn');
        window.pendingTeam = teamId;
        document.getElementById('statusMsg').innerHTML=`🏁 ${teamNames[teamId]} 获得抢答权！点击选项作答`;
    }
    
    function updateQuizUI(){
        if(winnerDeclared && !overtimeMode) return;
        let q = quizQuestions[currentQIndex];
        document.getElementById('currentQIdx').innerText = currentQIndex+1;
        document.getElementById('totalQ').innerText = quizQuestions.length;
        document.getElementById('quizQuestion').innerHTML = q.text;
        let optsDiv = document.getElementById('optionsContainer');
        optsDiv.innerHTML = '';
        q.options.forEach((opt,idx)=>{
            let btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.onclick = () => {
                if(!canAnswer || answered || winnerDeclared) { document.getElementById('statusMsg').innerHTML='⚠️ 本轮已经作答或比赛结束'; return; }
                if(window.pendingTeam === undefined){ document.getElementById('statusMsg').innerHTML='❌ 请先点击队伍卡片抢答！'; return; }
                answered = true; canAnswer = false;
                let isCorrect = (idx === q.correct);
                if(isCorrect){
                    let tid = window.pendingTeam;
                    teamScores[tid]++;
                    updateScoresUI();
                    document.getElementById('statusMsg').innerHTML=`🎉 ${teamNames[tid]} 回答正确! +1分`;
                }else{
                    document.getElementById('statusMsg').innerHTML=`❌ 回答错误，正确答案是 ${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}`;
                }
                document.getElementById('nextQuestionBtn').disabled = false;
            };
            optsDiv.appendChild(btn);
        });
        document.getElementById('nextQuestionBtn').disabled = true;
        if(!winnerDeclared) document.getElementById('statusMsg').innerHTML = '⚡ 点击队伍卡片抢答！';
        window.pendingTeam = undefined;
        canAnswer = true; answered = false;
    }
    
    function finishQuiz(){
        let maxScore = Math.max(...teamScores);
        let winners = teamScores.map((s,i)=>s===maxScore?i:null).filter(v=>v!==null);
        let winnerNamesStr = winners.map(i=>teamNames[i]).join(' 和 ');
        let msg = `🏆 最终优胜队伍: ${winnerNamesStr} 🏆<br> 得分: ${teamScores.map((s,i)=>`${teamNames[i]} ${s}分`).join(' | ')}`;
        document.getElementById('winnerMessage').innerHTML = msg;
        document.getElementById('winnerMessage').style.display = 'block';
        document.getElementById('statusMsg').innerHTML = '比赛结束！点击加赛可继续挑战';
        winnerDeclared = true;
        document.getElementById('nextQuestionBtn').disabled = true;
        document.getElementById('overtimeBtn').style.display = 'inline-block';
    }
    
    function startNextQuestion(){
        if(winnerDeclared && !overtimeMode) return;
        if(currentQIndex+1 >= quizQuestions.length){
            finishQuiz();
        }else{
            currentQIndex++;
            resetRoundState();
            updateQuizUI();
        }
    }
    
    function resetRoundState(){
        document.querySelectorAll('.team-card').forEach(card=>card.classList.remove('active-turn'));
        window.pendingTeam = undefined;
        canAnswer = true;
        answered = false;
    }
    
    function resetQuiz(){
        shuffleAndPick5(5);
        teamScores = [0,0,0];
        updateScoresUI();
        currentQIndex = 0;
        winnerDeclared = false;
        overtimeMode = false;
        canAnswer = true; answered = false;
        resetRoundState();
        document.getElementById('winnerMessage').style.display = 'none';
        document.getElementById('nextQuestionBtn').disabled = true;
        document.getElementById('overtimeBtn').style.display = 'none';
        updateQuizUI();
        document.getElementById('statusMsg').innerHTML = '⚡ 点击队伍卡片抢答！';
    }
    
    // 加赛一题
    function addOvertime(){
        if(!winnerDeclared && !overtimeMode){
            alert("比赛尚未结束，无需加赛");
            return;
        }
        // 随机抽取一道新题(不重复于当前题目列表)
        let existingTexts = quizQuestions.map(q=>q.text);
        let candidates = questionBank.filter(q => !existingTexts.includes(q.text));
        if(candidates.length === 0) candidates = [...questionBank];
        let newQuestion = candidates[Math.floor(Math.random() * candidates.length)];
        quizQuestions.push(newQuestion);
        overtimeMode = true;
        winnerDeclared = false;
        currentQIndex = quizQuestions.length - 1;
        canAnswer = true; answered = false;
        resetRoundState();
        document.getElementById('winnerMessage').style.display = 'none';
        document.getElementById('overtimeBtn').style.display = 'none';
        document.getElementById('nextQuestionBtn').disabled = true;
        updateQuizUI();
        document.getElementById('statusMsg').innerHTML = '⚡ 加赛一题！争夺最终荣耀！';
    }
    
    function initThirdLevel(){
        renderTeamPanel();
        shuffleAndPick5(5);
        teamScores = [0,0,0];
        updateScoresUI();
        currentQIndex = 0;
        winnerDeclared = false;
        overtimeMode = false;
        canAnswer = true; answered = false;
        document.getElementById('winnerMessage').style.display = 'none';
        document.getElementById('overtimeBtn').style.display = 'none';
        updateQuizUI();
        document.getElementById('nextQuestionBtn').onclick = startNextQuestion;
        document.getElementById('resetQuizBtn').onclick = resetQuiz;
        document.getElementById('overtimeBtn').onclick = addOvertime;
    }
    
    initThirdLevel();
    
    // 关卡切换
    function switchLevel(level){
        document.querySelectorAll('.level-container').forEach(cont=>cont.classList.remove('active'));
        document.getElementById(`level${level}`).classList.add('active');
        document.querySelectorAll('.level-btn').forEach(btn=>btn.classList.remove('active'));
        document.querySelector(`.level-btn[data-level="${level}"]`).classList.add('active');
        if(level===2 && !currentQuestion) updateSecondUI();
        if(level===3) initThirdLevel();
    }
    document.querySelectorAll('.level-btn').forEach(btn=>btn.addEventListener('click',(e)=>{ let lvl=parseInt(e.target.getAttribute('data-level')); switchLevel(lvl); }));
    updateSecondUI();
</script>
</body>
</html>
